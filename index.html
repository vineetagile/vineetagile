<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vineet Chopra | Agile Transformation Leader</title>
<meta name="description" content="Elite Agile Transformation Leader with 20+ years of leadership in Scrum, Enterprise Delivery, and Operations Strategy." />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%236366f1'/><text x='50' y='60' font-size='44' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>VC</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter', sans-serif;
background:radial-gradient(circle at top,#1e1b4b,#020617);
color:white; /* FIXED */
line-height:1.6
}

h1,h2,h3,h4,h5{
color:white;
}

p{
color:#cbd5e1;
}

header{
display:flex;
justify-content:space-between;
align-items:center; /* FIXED */
padding:25px 70px;
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:10
}

nav a{
color:#cbd5e1;
margin-left:24px;
text-decoration:none;
font-size:14px;
transition:.3s
}

nav a:hover{color:#818cf8}

section{padding:100px 70px}

.hero{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:50px;
align-items:center
}

.hero h2{
font-size:56px;
font-weight:800;
line-height:1.1;
margin-bottom:20px
}

.hero p{
font-size:20px;
max-width:620px
}

.hero img{
width:360px;
height:460px;
object-fit:cover;
border-radius:26px;
box-shadow:0 30px 70px rgba(0,0,0,.7)
}

.highlight{color:#818cf8}

.section-title{
font-size:38px;
font-weight:700;
margin-bottom:40px
}

.about{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:26px;
padding:55px
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px
}

.card{
background:rgba(255,255,255,.04);
padding:34px;
border-radius:24px;
transition:.4s;
backdrop-filter:blur(18px);
}

.card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,.08)
}

.timeline{
border-left:3px solid #6366f1;
padding-left:30px
}

.timeline-item{margin-bottom:36px}

.timeline-item h4{color:#818cf8;margin-bottom:8px}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px
}

.stat{
background:rgba(255,255,255,.05);
padding:40px;
border-radius:24px;
text-align:center
}

.stat h3{
font-size:42px;
color:#818cf8
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px
}

.service{
background:rgba(255,255,255,.04);
padding:35px;
border-radius:22px
}

.case-studies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px
}

.case{
background:#1e293b;
padding:30px;
border-radius:22px
}

.testimonials{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px
}

.testimonial{
background:#1e293b;
padding:32px;
border-radius:22px;
font-style:italic
}

.social-icons a{transition:.25s}
.social-icons a:hover{transform:scale(1.25)}

.social-icons svg{
fill:currentColor;
}

footer{
text-align:center;
padding:40px;
color:#64748b;
border-top:1px solid #1e293b
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
align-items:center;
justify-content:center
}

.modal-content{
background:#0f172a;
padding:50px;
border-radius:24px;
max-width:520px;
text-align:center
}

.modal a{color:#818cf8}

@media(max-width:900px){
.hero{grid-template-columns:1fr;text-align:center}
header{padding:20px}
section{padding:70px 20px}
}
</style>
</head>
